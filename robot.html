<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robot Builder!</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #FFF8F0;
      background-image: radial-gradient(#E8DDD4 1.5px, transparent 1.5px);
      background-size: 24px 24px;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 1.5rem 1rem 3rem;
    }
    .wrap { max-width: 440px; margin: 0 auto; }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: #A8957F; text-decoration: none;
      margin-bottom: 1.5rem; transition: color 0.15s;
    }
    .back-link:hover { color: #C4845A; }

    .page-title {
      font-size: 34px; font-weight: 700; text-align: center;
      color: #2E2018; margin-bottom: 0.2rem; letter-spacing: -0.5px;
    }
    .page-sub { font-size: 15px; color: #A8957F; text-align: center; margin-bottom: 1.5rem; }

    .card {
      background: white;
      border-radius: 20px;
      padding: 1.125rem 1.25rem;
      border: 1.5px solid #EDE5DA;
      box-shadow: 0 2px 10px rgba(46,32,24,0.06);
      margin-bottom: 0.75rem;
    }
    .card-label {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: #A8957F; margin-bottom: 0.875rem;
      display: flex; align-items: center; gap: 6px;
    }
    .card-label .check-badge {
      width: 16px; height: 16px; border-radius: 50%;
      background: #639922; display: none;
      align-items: center; justify-content: center;
      font-size: 9px; color: white; font-weight: 800;
    }
    .card-label.done { color: #639922; }
    .card-label.done .check-badge { display: flex; }

    /* Color swatches */
    .swatches { display: flex; justify-content: center; gap: 12px; }
    .swatch {
      width: 52px; height: 52px; border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer; position: relative;
      transition: transform 0.12s, box-shadow 0.12s, border-color 0.12s;
      box-shadow: 0 3px 8px rgba(0,0,0,0.18); outline: none;
    }
    .swatch:hover { transform: scale(1.13); box-shadow: 0 5px 14px rgba(0,0,0,0.24); }
    .swatch.sel { border-color: #2E2018; transform: scale(1.16); }
    .swatch .check {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 22px; font-weight: 800;
      opacity: 0; transition: opacity 0.12s;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
    .swatch.sel .check { opacity: 1; }

    /* Emoji pills */
    .pills { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; }
    .pill {
      width: 66px; height: 66px; border-radius: 18px;
      border: 2.5px solid transparent;
      cursor: pointer; font-size: 30px;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s;
      box-shadow: 0 2px 6px rgba(46,32,24,0.08); outline: none;
    }
    .pill:hover { transform: scale(1.1); box-shadow: 0 4px 12px rgba(46,32,24,0.14); }
    .pill.sel { border-color: #2E2018; transform: scale(1.12); box-shadow: 0 4px 12px rgba(46,32,24,0.16); }

    /* Name display */
    .name-display {
      background: #1C1410;
      border-radius: 12px;
      padding: 13px 20px;
      font-size: 26px; font-weight: 700;
      color: #F5D87A;
      text-align: center;
      margin-bottom: 10px;
      min-height: 58px;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid #2E2018;
      transition: opacity 0.1s;
      letter-spacing: 1px;
    }
    .name-display.spinning { opacity: 0.55; }

    .spin-btn {
      width: 100%;
      padding: 11px;
      border-radius: 12px;
      border: 2px solid #D3CBEC;
      background: #EEEDFE;
      color: #3C3489;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s, background 0.12s;
    }
    .spin-btn:hover { background: #DDDCF5; transform: scale(1.02); }
    .spin-btn.locked { background: #7F77DD; color: white; border-color: #534AB7; }

    /* Build button */
    .build-btn {
      display: block; width: 100%;
      padding: 18px; border-radius: 16px; border: none;
      font-size: 18px; font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      background: linear-gradient(135deg, #7F77DD 0%, #534AB7 100%);
      color: white;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 0 #3C3489;
      margin-top: 0.375rem;
    }
    .build-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 0 #3C3489; }
    .build-btn:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 2px 0 #3C3489; }
    .build-btn:disabled {
      background: linear-gradient(135deg, #D3D1C7, #C4C2B8);
      box-shadow: 0 4px 0 #B4B2A9;
      cursor: not-allowed; color: #9A9490;
    }

    /* Result */
    .result { animation: popIn 0.45s cubic-bezier(0.34,1.56,0.64,1) both; }
    @keyframes popIn {
      from { opacity:0; transform: scale(0.75) translateY(16px); }
      to { opacity:1; transform: scale(1) translateY(0); }
    }

    .result-card {
      background: white; border-radius: 24px;
      padding: 1.5rem 1.5rem 1.25rem;
      border: 1.5px solid #EDE5DA;
      box-shadow: 0 8px 28px rgba(46,32,24,0.1);
      text-align: center;
    }
    .result-badge {
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: #A8957F; margin-bottom: 1.125rem;
    }
    .robot-canvas {
      display: inline-block; border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(46,32,24,0.14);
      margin-bottom: 1.125rem;
    }
    .r-name {
      font-size: 26px; font-weight: 700; color: #2E2018;
      margin-bottom: 0.2rem; letter-spacing: -0.3px;
    }
    .r-desc { font-size: 15px; color: #7A6555; margin-bottom: 1.125rem; }

    .result-btns { display: flex; gap: 10px; }
    .save-btn, .again-btn {
      flex: 1; padding: 13px; border-radius: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s, background 0.12s;
      display: flex; align-items: center; justify-content: center; gap: 5px;
      border: 2px solid transparent;
    }
    .save-btn { background: #EAF3DE; color: #27500A; border-color: #C5D9A8; }
    .save-btn:hover { background: #D8EBC7; transform: scale(1.02); }
    .again-btn { background: white; color: #2E2018; border-color: #EDE5DA; }
    .again-btn:hover { background: #FAF7F2; transform: scale(1.02); }
  </style>
</head>
<body>
<div id="_gate" style="position:fixed;inset:0;background:#FAF7F2;z-index:9999;display:flex;align-items:center;justify-content:center;padding:2rem;"><div style="max-width:320px;width:100%;text-align:center;font-family:'DM Sans',sans-serif;"><div style="font-size:32px;margin-bottom:1rem;">&#128274;</div><p style="font-family:'Lora',serif;font-size:20px;font-weight:500;color:#2E2018;margin-bottom:0.4rem;">Private</p><p style="font-size:13px;color:#A8957F;margin-bottom:1.5rem;">You need the password to get in.</p><input id="_gpw" type="password" placeholder="Password" style="width:100%;padding:12px 14px;border:1px solid #EDE5DA;border-radius:10px;font-size:14px;margin-bottom:10px;outline:none;background:white;color:#2E2018;box-sizing:border-box;" onkeydown="if(event.key==='Enter')_gate_check()"/><button onclick="_gate_check()" style="width:100%;padding:13px;background:#C4845A;color:white;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;">Enter &#x2192;</button><p id="_gerr" style="color:#7A3A1A;font-size:13px;margin-top:8px;visibility:hidden;">Wrong password.</p></div></div><script>(function(){if(sessionStorage.getItem('sc_auth')==='1'){var g=document.getElementById('_gate');if(g)g.remove();}})();function sha256(s){return crypto.subtle.digest('SHA-256',new TextEncoder().encode(s)).then(function(b){return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0');}).join('');});}async function _gate_check(){var h=await sha256(document.getElementById('_gpw').value);if(h==='72292850ba7f7dd15cd4361e7796e7e9de57ec5e64e964ce95671953585a7721'){sessionStorage.setItem('sc_auth','1');document.getElementById('_gate').remove();}else{document.getElementById('_gerr').style.visibility='visible';document.getElementById('_gpw').value='';document.getElementById('_gpw').focus();}}</script>

<div class="wrap">
  <a class="back-link" href="index.html">← Back</a>

  <h1 class="page-title">🤖 Robot Builder</h1>
  <p class="page-sub">Pick your parts, then build!</p>

  <div id="form">

    <div class="card">
      <div class="card-label" id="nameLabel">Give it a name <span class="check-badge">✓</span></div>
      <div class="name-display" id="nameDisplay">???</div>
      <button class="spin-btn" id="spinBtn" onclick="spinName()">🎲 Spin!</button>
    </div>

    <div class="card">
      <div class="card-label" id="colorLabel">Pick a color <span class="check-badge">✓</span></div>
      <div class="swatches">
        <button class="swatch" style="background:#E24B4A;" data-g="color" data-v="red"    onclick="pick(this,'color')" aria-label="Red">   <span class="check">✓</span></button>
        <button class="swatch" style="background:#378ADD;" data-g="color" data-v="blue"   onclick="pick(this,'color')" aria-label="Blue">  <span class="check">✓</span></button>
        <button class="swatch" style="background:#639922;" data-g="color" data-v="green"  onclick="pick(this,'color')" aria-label="Green"> <span class="check">✓</span></button>
        <button class="swatch" style="background:#7F77DD;" data-g="color" data-v="purple" onclick="pick(this,'color')" aria-label="Purple"><span class="check">✓</span></button>
        <button class="swatch" style="background:#EF9F27;" data-g="color" data-v="orange" onclick="pick(this,'color')" aria-label="Orange"><span class="check">✓</span></button>
      </div>
    </div>

    <div class="card">
      <div class="card-label" id="themeLabel">Pick a theme <span class="check-badge">✓</span></div>
      <div class="pills">
        <button class="pill" style="background:#0A0E2A;" data-g="theme" data-v="stars"   onclick="pick(this,'theme')">⭐</button>
        <button class="pill" style="background:#FBEAF0;" data-g="theme" data-v="dance"   onclick="pick(this,'theme')">💃</button>
        <button class="pill" style="background:#F5F5F5;" data-g="theme" data-v="rainbow" onclick="pick(this,'theme')">🌈</button>
        <button class="pill" style="background:#FFF0E0;" data-g="theme" data-v="fire"    onclick="pick(this,'theme')">🔥</button>
        <button class="pill" style="background:#E6F1FB;" data-g="theme" data-v="water"   onclick="pick(this,'theme')">💧</button>
      </div>
    </div>

    <div class="card">
      <div class="card-label" id="bgLabel">Pick a background <span class="check-badge">✓</span></div>
      <div class="pills">
        <button class="pill" style="background:#F8F8F6;" data-g="bg" data-v="white"   onclick="pick(this,'bg')">⬜</button>
        <button class="pill" style="background:#1A1A1A;" data-g="bg" data-v="black"   onclick="pick(this,'bg')">⬛</button>
        <button class="pill" style="background:#FFF3C4;" data-g="bg" data-v="yellow"  onclick="pick(this,'bg')">🟡</button>
        <button class="pill" style="background:#FFE8F0;" data-g="bg" data-v="pink"    onclick="pick(this,'bg')">🩷</button>
        <button class="pill" style="background:#D6EEFF;" data-g="bg" data-v="skyblue" onclick="pick(this,'bg')">🩵</button>
      </div>
    </div>

    <button class="build-btn" id="buildBtn" onclick="build()" disabled>🤖 Build my robot!</button>

  </div>

  <div id="result" style="display:none;" class="result">
    <div class="result-card">
      <div class="result-badge">✨ Your robot is ready!</div>
      <div class="robot-canvas" id="rCanvas"></div>
      <div class="r-name" id="rName"></div>
      <div class="r-desc" id="rDesc"></div>
      <div class="result-btns">
        <button class="save-btn" onclick="saveRobot()">💾 Save</button>
        <button class="again-btn" onclick="again()">🤖 Build another</button>
      </div>
    </div>
  </div>
</div>

<script>
  const robotNames = [
    'Zippity','Bloop','Wobble','Fizz','Bonk',
    'Noodle','Zoink','Squiggles','Boing','Zippy',
    'Wubble','Doodlebug','Flopsy','Kazoo','Sprocket',
    'Giggles','Zap','Beeper','Rattle','Biscuit',
    'Whirly','Snorkel','Dingus','Flibber','Toots',
    'Bumble','Squishy','Zigzag','Plink','Donut'
  ];

  const colors = {
    red:    {main:'#E24B4A',light:'#F09595',dark:'#791F1F',eye:'#FCEBEB'},
    blue:   {main:'#378ADD',light:'#85B7EB',dark:'#0C447C',eye:'#E6F1FB'},
    green:  {main:'#639922',light:'#97C459',dark:'#27500A',eye:'#EAF3DE'},
    purple: {main:'#7F77DD',light:'#AFA9EC',dark:'#3C3489',eye:'#EEEDFE'},
    orange: {main:'#EF9F27',light:'#FAC775',dark:'#633806',eye:'#FAEEDA'}
  };

  const bgs = {white:'#F8F8F6',black:'#1A1A1A',yellow:'#FFF3C4',pink:'#FFE8F0',skyblue:'#D6EEFF'};

  const descs = {
    stars:'A cosmic explorer from the outer galaxy!',
    dance:'This robot loves to boogie 24/7!',
    rainbow:'Spreading colorful joy everywhere!',
    fire:'Hot stuff — handle with oven mitts!',
    water:'Makes a splash wherever it goes!'
  };

  const decorations = {
    stars: (cx,cy,c) => `
      <circle cx="${cx-60}" cy="${cy-80}" r="5" fill="${c.light}" opacity="0.9"/>
      <circle cx="${cx+70}" cy="${cy-60}" r="3" fill="${c.light}" opacity="0.8"/>
      <circle cx="${cx-80}" cy="${cy+20}" r="3" fill="${c.light}" opacity="0.7"/>
      <circle cx="${cx+85}" cy="${cy+40}" r="4" fill="${c.light}" opacity="0.9"/>
      <text x="${cx-55}" y="${cy-68}" font-size="18" text-anchor="middle" font-family="sans-serif">★</text>
      <text x="${cx+72}" y="${cy-48}" font-size="13" text-anchor="middle" font-family="sans-serif">★</text>
      <text x="${cx+3}" y="${cy-100}" font-size="20" text-anchor="middle" font-family="sans-serif">★</text>`,
    dance: (cx,cy,c) => `
      <path d="M${cx-90},${cy+20} Q${cx-60},${cy} ${cx-40},${cy+30}" stroke="${c.light}" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M${cx+90},${cy+20} Q${cx+60},${cy} ${cx+40},${cy+30}" stroke="${c.light}" stroke-width="4" fill="none" stroke-linecap="round"/>
      <circle cx="${cx-50}" cy="${cy-90}" r="7" fill="${c.light}" opacity="0.8"/>
      <circle cx="${cx+50}" cy="${cy-85}" r="5" fill="${c.light}" opacity="0.7"/>
      <text x="${cx-80}" y="${cy+65}" font-size="20" text-anchor="middle" font-family="sans-serif">🎵</text>
      <text x="${cx+80}" y="${cy+50}" font-size="16" text-anchor="middle" font-family="sans-serif">🎶</text>`,
    rainbow: (cx,cy,c) => `
      <path d="M${cx-70},${cy-48} Q${cx},${cy-120} ${cx+70},${cy-48}" stroke="#E24B4A" stroke-width="5" fill="none" opacity="0.8"/>
      <path d="M${cx-58},${cy-43} Q${cx},${cy-102} ${cx+58},${cy-43}" stroke="#EF9F27" stroke-width="5" fill="none" opacity="0.8"/>
      <path d="M${cx-46},${cy-38} Q${cx},${cy-86} ${cx+46},${cy-38}" stroke="#639922" stroke-width="5" fill="none" opacity="0.8"/>
      <path d="M${cx-34},${cy-33} Q${cx},${cy-70} ${cx+34},${cy-33}" stroke="#378ADD" stroke-width="5" fill="none" opacity="0.8"/>
      <path d="M${cx-22},${cy-28} Q${cx},${cy-54} ${cx+22},${cy-28}" stroke="#7F77DD" stroke-width="5" fill="none" opacity="0.8"/>`,
    fire: (cx,cy,c) => `
      <ellipse cx="${cx}" cy="${cy-118}" rx="12" ry="20" fill="#E24B4A" opacity="0.85"/>
      <ellipse cx="${cx-16}" cy="${cy-110}" rx="8" ry="14" fill="#EF9F27" opacity="0.75"/>
      <ellipse cx="${cx+16}" cy="${cy-110}" rx="8" ry="14" fill="#EF9F27" opacity="0.75"/>
      <ellipse cx="${cx}" cy="${cy-110}" rx="6" ry="11" fill="#FAC775" opacity="0.9"/>
      <text x="${cx-65}" y="${cy+55}" font-size="20" text-anchor="middle" font-family="sans-serif">🔥</text>
      <text x="${cx+65}" y="${cy+50}" font-size="16" text-anchor="middle" font-family="sans-serif">💥</text>`,
    water: (cx,cy,c) => `
      <path d="M${cx-80},${cy+78} Q${cx-55},${cy+60} ${cx-30},${cy+78} Q${cx-5},${cy+96} ${cx+20},${cy+78} Q${cx+45},${cy+60} ${cx+80},${cy+78}" stroke="#378ADD" stroke-width="4" fill="none" opacity="0.7"/>
      <path d="M${cx-80},${cy+95} Q${cx-55},${cy+77} ${cx-30},${cy+95} Q${cx-5},${cy+113} ${cx+20},${cy+95} Q${cx+45},${cy+77} ${cx+80},${cy+95}" stroke="#85B7EB" stroke-width="4" fill="none" opacity="0.6"/>
      <text x="${cx+10}" y="${cy-108}" font-size="20" text-anchor="middle" font-family="sans-serif">💧</text>
      <text x="${cx-70}" y="${cy-58}" font-size="16" text-anchor="middle" font-family="sans-serif">🌊</text>`
  };

  const picks = {color:null, theme:null, bg:null};
  let currentName = null;
  let spinInterval = null;
  let isLocked = false;

  function spinName() {
    const btn = document.getElementById('spinBtn');
    const display = document.getElementById('nameDisplay');

    if (isLocked) {
      isLocked = false;
      btn.textContent = '🎲 Spin!';
      btn.classList.remove('locked');
      currentName = null;
      updateLabel('nameLabel', false);
      checkReady();
      startSpinning();
      return;
    }

    if (spinInterval) {
      clearInterval(spinInterval);
      spinInterval = null;
      isLocked = true;
      display.classList.remove('spinning');
      btn.textContent = '✅ Locked in!';
      btn.classList.add('locked');
      updateLabel('nameLabel', true);
      checkReady();
      return;
    }

    startSpinning();
  }

  function startSpinning() {
    const display = document.getElementById('nameDisplay');
    display.classList.add('spinning');
    spinInterval = setInterval(() => {
      const n = robotNames[Math.floor(Math.random() * robotNames.length)];
      display.textContent = n;
      currentName = n;
    }, 80);
  }

  function pick(btn, group) {
    document.querySelectorAll(`[data-g="${group}"]`).forEach(b => b.classList.remove('sel'));
    btn.classList.add('sel');
    picks[group] = btn.dataset.v;
    updateLabel(group + 'Label', true);
    checkReady();
  }

  function updateLabel(id, done) {
    document.getElementById(id).classList.toggle('done', done);
  }

  function checkReady() {
    document.getElementById('buildBtn').disabled = !(picks.color && picks.theme && picks.bg && isLocked);
  }

  function build() {
    const c = colors[picks.color];
    const bg = bgs[picks.bg];
    const cx = 150, cy = 165;
    const decor = decorations[picks.theme](cx, cy, c);
    const name = currentName || 'Robo';

    const svg = `<svg viewBox="0 0 300 320" xmlns="http://www.w3.org/2000/svg" width="300" height="320">
      <rect width="300" height="320" fill="${bg}" rx="20"/>
      ${decor}
      <rect x="${cx-48}" y="${cy-100}" width="96" height="82" rx="16" fill="${c.main}"/>
      <circle cx="${cx-19}" cy="${cy-74}" r="14" fill="${c.eye}"/>
      <circle cx="${cx+19}" cy="${cy-74}" r="14" fill="${c.eye}"/>
      <circle cx="${cx-19}" cy="${cy-74}" r="8" fill="${c.dark}"/>
      <circle cx="${cx+19}" cy="${cy-74}" r="8" fill="${c.dark}"/>
      <circle cx="${cx-16}" cy="${cy-77}" r="3" fill="white"/>
      <circle cx="${cx+22}" cy="${cy-77}" r="3" fill="white"/>
      <rect x="${cx-18}" y="${cy-52}" width="36" height="9" rx="5" fill="${c.eye}" opacity="0.9"/>
      <rect x="${cx-12}" y="${cy-51}" width="10" height="7" rx="3" fill="${c.main}"/>
      <rect x="${cx+2}" y="${cy-51}" width="10" height="7" rx="3" fill="${c.main}"/>
      <circle cx="${cx}" cy="${cy-105}" r="9" fill="${c.light}"/>
      <circle cx="${cx}" cy="${cy-105}" r="5" fill="${c.main}"/>
      <rect x="${cx-58}" y="${cy-18}" width="116" height="88" rx="14" fill="${c.main}"/>
      <rect x="${cx-46}" y="${cy-8}" width="32" height="10" rx="5" fill="${c.eye}" opacity="0.8"/>
      <rect x="${cx+14}" y="${cy-8}" width="32" height="10" rx="5" fill="${c.eye}" opacity="0.8"/>
      <circle cx="${cx-30}" cy="${cy+22}" r="10" fill="${c.eye}" opacity="0.9"/>
      <circle cx="${cx+30}" cy="${cy+22}" r="10" fill="${c.eye}" opacity="0.9"/>
      <rect x="${cx-18}" y="${cy+40}" width="36" height="12" rx="6" fill="${c.light}"/>
      <rect x="${cx-75}" y="${cy-16}" width="20" height="62" rx="10" fill="${c.light}"/>
      <rect x="${cx+55}" y="${cy-16}" width="20" height="62" rx="10" fill="${c.light}"/>
      <circle cx="${cx-65}" cy="${cy-16}" r="10" fill="${c.main}"/>
      <circle cx="${cx+65}" cy="${cy-16}" r="10" fill="${c.main}"/>
      <rect x="${cx-33}" y="${cy+70}" width="24" height="46" rx="9" fill="${c.light}"/>
      <rect x="${cx+9}" y="${cy+70}" width="24" height="46" rx="9" fill="${c.light}"/>
      <rect x="${cx-36}" y="${cy+106}" width="30" height="15" rx="7" fill="${c.main}"/>
      <rect x="${cx+6}" y="${cy+106}" width="30" height="15" rx="7" fill="${c.main}"/>
      <text x="${cx}" y="${cy+145}" font-size="15" font-weight="700" text-anchor="middle" font-family="'DM Sans',sans-serif" fill="${c.dark}">${name}</text>
    </svg>`;

    document.getElementById('rName').textContent = name + ' the Robot!';
    document.getElementById('rDesc').textContent = descs[picks.theme];
    document.getElementById('rCanvas').innerHTML = svg;
    document.getElementById('form').style.display = 'none';
    document.getElementById('result').style.display = 'block';
  }

  function saveRobot() {
    const svg = document.querySelector('#rCanvas svg');
    if (!svg) return;
    const blob = new Blob([svg.outerHTML], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (currentName || 'robot').toLowerCase() + '-robot.svg';
    a.click();
    URL.revokeObjectURL(url);
  }

  function again() {
    picks.color = null; picks.theme = null; picks.bg = null;
    currentName = null; isLocked = false;
    if (spinInterval) { clearInterval(spinInterval); spinInterval = null; }
    document.querySelectorAll('.pill, .swatch').forEach(b => b.classList.remove('sel'));
    document.getElementById('buildBtn').disabled = true;
    document.getElementById('nameDisplay').textContent = '???';
    document.getElementById('nameDisplay').classList.remove('spinning');
    document.getElementById('spinBtn').textContent = '🎲 Spin!';
    document.getElementById('spinBtn').classList.remove('locked');
    ['nameLabel','colorLabel','themeLabel','bgLabel'].forEach(id => updateLabel(id, false));
    document.getElementById('form').style.display = 'block';
    document.getElementById('result').style.display = 'none';
  }
</script>
</body>
</html>
